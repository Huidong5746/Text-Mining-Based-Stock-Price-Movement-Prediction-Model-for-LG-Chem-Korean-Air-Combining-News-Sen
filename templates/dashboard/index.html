{% load static %}
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>뉴스 기반 주가 등락 예측</title>
    <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}?v=2">
  </head>
  <body>
    <main class="shell" data-api-base="{{ api_base_url }}">
      <section class="hero">
        <div>
          <p class="eyebrow">News Sentiment Signal</p>
          <h1>뉴스와 감성 점수로 보는 주가 등락 예측</h1>
          <p class="subcopy">대한항공, LG화학, 유가 최신 뉴스를 수집하고 학습된 모델로 내일 주가 방향을 예측합니다.</p>
        </div>
        <div class="status-panel">
          <span class="status-dot" id="apiDot"></span>
          <div>
            <strong id="apiStatus">API 확인 중</strong>
            <p id="updatedAt">뉴스 업데이트 대기 중</p>
          </div>
        </div>
      </section>

      <section class="metrics" id="metrics"></section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Tomorrow Forecast</p>
          <h2>최신뉴스 기반 내일 주가 예측</h2>
        </div>
      </section>
      <section class="tomorrow-grid" id="tomorrowGrid"></section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Latest News</p>
          <h2>대한항공 · LG화학 · 유가 최신 뉴스</h2>
        </div>
        <button class="refresh" id="refreshNews">뉴스 업데이트</button>
      </section>
      <section class="news-grid" id="newsGrid"></section>

      <section class="section-head">
        <div>
          <p class="eyebrow">Model Output</p>
          <h2>최근 데이터 예측 결과</h2>
        </div>
      </section>
      <section class="prediction-grid" id="predictionGrid"></section>
    </main>

    <script src="{% static 'dashboard/app.js' %}?v=2"></script>
  </body>
</html>
